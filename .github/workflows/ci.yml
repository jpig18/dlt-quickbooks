name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --frozen
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Type check
        run: uv run mypy
      - name: Unit tests
        run: uv run pytest -m "not live"

  # Integration tests against an Intuit sandbox company. Runs only when the
  # DLT_SECRETS_TOML repository secret is configured (mirrors the
  # dlt-hub/verified-sources CI convention).
  live:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Write secrets
        env:
          DLT_SECRETS_TOML: ${{ secrets.DLT_SECRETS_TOML }}
        run: |
          if [ -z "$DLT_SECRETS_TOML" ]; then
            echo "no sandbox credentials configured — skipping live tests"
            echo "SKIP_LIVE=1" >> "$GITHUB_ENV"
          else
            mkdir -p .dlt
            echo "$DLT_SECRETS_TOML" > .dlt/secrets.toml
          fi
      - name: Live tests
        if: env.SKIP_LIVE != '1'
        run: uv run pytest -m live
