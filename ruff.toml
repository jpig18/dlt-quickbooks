target-version = "py310"

[lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "I",
    "D",
    "W505",
    "T201",
    "UP",
    "B",
    "RUF",
]
ignore = [
    "D100",
    "D101",
    "D102",
    "D103",
    "D104",
    "D105",
    "D106",
    "D107",
    "D205",
]

[lint.pycodestyle]
max-doc-length = 100

[lint.pydocstyle]
convention = "google"

[lint.isort]
known-first-party = ["quickbooks"]

[lint.per-file-ignores]
"tests/**" = ["D"]

[format]
docstring-code-format = true
